name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: npm ci
        run: npm ci

      # Включает `cargo test --workspace`: в т.ч. smoke «single .cfg + модульный набор» (`goldsr_cfg_core::exporter::tests::smoke_single_cfg_and_modular_pipeline`).
      - name: npm test
        run: npm test
